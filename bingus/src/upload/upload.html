<!doctype html>
<html lang="en">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bingo - Upload Photo and Sentence</title>
		<style>
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				min-height: 100vh;
				background: #f0f4f0;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 12px;
				font-family: Arial, Helvetica, sans-serif;
			}

			.container {
				width: 100%;
				max-width: 700px;
				background: white;
				border-radius: 16px;
				padding: 28px;
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
			}

			h1 {
				margin-top: 0;
				text-align: center;
			}

			.upload-box {
				border: 2px dashed #9aa4b2;
				border-radius: 12px;
				padding: 24px;
				text-align: center;
				cursor: pointer;
				background: #fafafa;
				margin-bottom: 20px;
			}

			.upload-box:hover {
				background: #f0f4f8;
			}

			input[type="file"] {
				display: none;
			}

			#preview {
				display: none;
				max-width: 100%;
				max-height: 300px;
				margin: 18px auto 0;
				border-radius: 10px;
				object-fit: contain;
			}

			label {
				display: block;
				font-weight: bold;
				margin-bottom: 8px;
			}

			textarea {
				width: 100%;
				min-height: 120px;
				resize: vertical;
				border: 1px solid #cbd5e1;
				border-radius: 10px;
				padding: 12px;
				font-size: 16px;
				margin-bottom: 16px;
			}

			.counter {
				text-align: right;
				color: #667085;
				font-size: 14px;
				margin-top: -10px;
				margin-bottom: 16px;
			}

			.button {
				width: 100%;
				border: none;
				border-radius: 10px;
				padding: 14px;
				font-size: 16px;
				font-weight: bold;
				color: white;
				cursor: pointer;
			}

			.blue {
				background: #2563eb;
			}

			.blue:hover {
				background: #1d4ed8;
			}

			.gray {
				background: #a8a8a8;
			}

			.gray:hover {
				background: #6b7280;
			}

			.buttons {
				display: flex;
				flex-direction: column;
				gap: 15px;
			}

			.output {
				margin-top: 22px;
				padding: 16px;
				border-radius: 10px;
				background: #f8fafc;
				border: 1px solid #e2e8f0;
				display: none;
			}

			.output p {
				margin-bottom: 0;
				word-wrap: break-word;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h1>
				<a href="https://www.google.com" target="_blank" rel="noopener"
					>[Bingo Item Name]</a
				>
			</h1>

			<div class="upload-box" id="uploadBox">
				<strong>Click to upload image</strong>
				<p>PNG, JPG, JPEG, or GIF</p>
				<input type="file" id="imageInput" accept="image/*" />
				<img id="preview" alt="Image preview" />
			</div>

			<label for="sentenceInput"
				>Write about your bingo experience!</label
			>
			<textarea id="sentenceInput" placeholder="Type here..."></textarea>

			<div class="counter"><span id="charCount">0</span> characters</div>

			<div class="buttons">
				<button id="submitBtn" class="button blue">Submit</button>
				<button id="cancelBtn" class="button gray">Cancel</button>
			</div>

			<div class="output" id="output">
				<h3>Submitted Data</h3>
				<p>
					<strong>Sentence:</strong> <span id="outputSentence"></span>
				</p>
				<p>
					<strong>Image:</strong> <span id="outputImageName"></span>
				</p>
			</div>
		</div>

		<script>
			const uploadBox = document.getElementById("uploadBox");
			const imageInput = document.getElementById("imageInput");
			const preview = document.getElementById("preview");
			const sentenceInput = document.getElementById("sentenceInput");
			const charCount = document.getElementById("charCount");
			const submitBtn = document.getElementById("submitBtn");
			const cancelBtn = document.getElementById("cancelBtn");
			const output = document.getElementById("output");
			const outputSentence = document.getElementById("outputSentence");
			const outputImageName = document.getElementById("outputImageName");

			let selectedImageName = "";

			uploadBox.addEventListener("click", () => {
				imageInput.click();
			});

			imageInput.addEventListener("change", () => {
				const file = imageInput.files[0];

				if (!file) return;

				if (!file.type.startsWith("image/")) {
					alert("Please upload a valid image file.");
					imageInput.value = "";
					return;
				}

				selectedImageName = file.name;

				const reader = new FileReader();

				reader.onload = (event) => {
					preview.src = event.target.result;
					preview.style.display = "block";
				};

				reader.readAsDataURL(file);
			});

			sentenceInput.addEventListener("input", () => {
				charCount.textContent = sentenceInput.value.length;
			});

			submitBtn.addEventListener("click", () => {
				const sentence = sentenceInput.value.trim();

				if (!selectedImageName) {
					alert("Please upload an image.");
					return;
				}

				if (!sentence) {
					alert("Please type a sentence.");
					return;
				}

				outputSentence.textContent = sentence;
				outputImageName.textContent = selectedImageName;
				output.style.display = "block";

				console.log({
					imageName: selectedImageName,
					sentence: sentence,
				});
			});

			cancelBtn.addEventListener("click", () => {
				imageInput.value = "";
				preview.src = "";
				preview.style.display = "none";
				sentenceInput.value = "";
				charCount.textContent = "0";
				output.style.display = "none";
				selectedImageName = "";
				window.location.href = "index.html";
			});
		</script>
	</body>
</html>
