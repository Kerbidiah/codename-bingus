<!doctype html>
<html lang="en">
	<head>
    	<meta charset="UTF-8"/>
     	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
      	<title>Bingus</title>
	    <style>
			/* DARK THEME (default) */
			body{
			  --bg: #0b1220;
			  --text: #e8eefc;
			
			  --nav-bg: rgba(11, 18, 32, 0.85);
			  --nav-border: rgba(255, 255, 255, 0.08);
			
			  --link: #e8eefc;
			  --link-hover-bg: rgba(255, 255, 255, 0.08);
			
			  --btn-text: #0b1220;
			  --btn-g1: #4de3ff;
			  --btn-g2: #7c5cff;
			  --btn-shadow: rgba(124, 92, 255, 0.22);
			  --btn-shadow-2: rgba(124, 92, 255, 0.30);
			}
			
			/* LIGHT THEME */
			body.light{
			  --bg: #f6f7fb;
			  --text: #0f172a;
			
			  --nav-bg: rgba(246, 247, 251, 0.9);
			  --nav-border: rgba(15, 23, 42, 0.08);
			
			  --link: #0f172a;
			  --link-hover-bg: rgba(15, 23, 42, 0.06);
			
			  --btn-text: #0b1220;
			  --btn-g1: #36d6ff;
			  --btn-g2: #6f5bff;
			  --btn-shadow: rgba(111, 91, 255, 0.18);
			  --btn-shadow-2: rgba(111, 91, 255, 0.26);
			}
			/* Base styles (shared) */
			body{
			  margin: 0;
			  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
			  background: var(--bg);
			  color: var(--text);
			}
			
			.navigation{
			  position: sticky;
			  top: 0;
			  z-index: 10;
			  background: var(--nav-bg);
			  backdrop-filter: blur(10px);
			  border-bottom: 1px solid var(--nav-border);
			}
			
			nav.navigation a{
			  color: var(--link);
			  text-decoration: none;
			  font-weight: 600;
			  letter-spacing: 0.2px;
			  padding: 10px 12px;
			  border-radius: 10px;
			  transition: background-color 160ms ease, transform 160ms ease;
			}
			
			nav.navigation a:hover{
			  background: var(--link-hover-bg);
			  transform: translateY(-1px);
			}
			
			#cards button{
			  appearance: none;
			  border: 0;
			  cursor: pointer;
			  padding: 14px 22px;
			  border-radius: 14px;
			  font-size: 1rem;
			  font-weight: 700;
			
			  color: var(--btn-text);
			  background: linear-gradient(135deg, var(--btn-g1), var(--btn-g2));
			  box-shadow: 0 12px 30px var(--btn-shadow);
			  transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
			}
			
			#cards button:hover{
			  transform: translateY(-2px);
			  box-shadow: 0 16px 36px var(--btn-shadow-2);
			  filter: brightness(1.04);
			}
			
			#cards button:active{
			  transform: translateY(0);
			}
			
			/* Layout unchanged */
			nav.navigation{
			  max-width: 1100px;
			  margin: 0 auto;
			  padding: 14px 18px;
			  display: flex;
			  align-items: center;
			  gap: 18px;
			  justify-content: center;
			}
			
			nav.navigation a#dark-mode{
			  margin-left: auto;
			  padding: 8px;
			  display: inline-flex;
			  align-items: center;
			  justify-content: center;
			}
			
			nav.navigation a#dark-mode img{
			  width: 22px;
			  height: 22px;
			  display: block;
			}
			.body{
			  min-height: calc(100vh - 60px);
			  display: flex;
			  flex-direction: column;
			  justify-content: center;
			  align-items: center;
			  padding: 48px 18px;
			  text-align: center;
			}
			.title{
			  font-size: clamp(2rem, 5vw, 3.25rem);
			  margin: 0 0 18px;
			  line-height: 1.05;
			}
			#cards{
			  display: flex;
			  justify-content: center;
			  align-items: center;
			  padding: 10px;
			}
	    </style>
		<script>
			const { invoke } = window.__TAURI__.core;

			function create_board_dialog() {
				return;
			}

			// Creates the card in the DOM
			function draw_card(name, owner) {
				const card_wrapper = document.createElement('div');
				card.className = "card-wrapper";

				const name_wrapper = document.createElement('div');
				name_wrapper.className = "name-wrapper";
				const card_name = document.createElement('a');
				card_name.textContent = name;
				name_wrapper.appendChild(card_name);
				
				const button_wrapper = document.createElement('div');
				button_wrapper.className = "button-wrapper";
				if (owner === true) {
					const edit_button = document.createElement('button');
				}
				
				card_wrapper.appendChild(name_wrapper);
				card_wrapper.appendChild(button_wrapper);
			}
			
			const boards = await invoke('get_boards');
			if (boards.length === 0) {
				const cards = document.getElementById('cards');

				const create_board_button = document.createElement('button');
				create_board_button.id = "create-board";
				create_board_button.addEventListener("click", () => {
					create_board_dialog();
				});
				cards.appendChild(create_board_button);
			} 
			else {
				for (const elem in boards) {
					// TODO: Render the cards of the boards.
					draw_card(elem.city, elem.owner);
				}
			}
		</script>
  	</head>

   	<body>
	    <div class="navigation">
	    	<nav class="navigation">
	     		<a href="about:blank" id="home">Home</a>
				<a href="about:blank" id="about">About</a>
				<a href="about:blank" id="dark-mode">
					<img src="/assets/enable-light-mode.svg" alt="Light Mode Selector">
				</a>
	     	</nav>
	    </div>
	    <div class="body">
	       		<h1 class="title">Bingus</h1>
	         	<div id="bingo-cards">
						<!-- This section draws out preview for each Bingo Board -->
		        </div>
	    </div>
    </body>
</html>
