		<script>
			const { invoke } = window.__TAURI__.core;

			function create_board_dialog() {
				return;
			}
			
			const boards = await invoke('get_boards');
			if (boards.length === 0) {
				const container = document.getElementByClassName('container');

				const create_board_button = document.createElement('button');
				create_board_button.id = "create-board";
				create_board_button.addEventListener("click", () => {
					create_board_dialog();
				});
			}
		</script>
