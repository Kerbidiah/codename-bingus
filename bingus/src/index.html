<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bingus</title>
		<style>
			/* QoL for users to know what elements are clickable */
			a {
				cursor: pointer;
			}
			/* DARK THEME (default) */
			body{
				--bg: #0b1220;
				--text: #e8eefc;

				--nav-bg: rgba(11, 18, 32, 0.85);
				--nav-border: rgba(255, 255, 255, 0.08);
			
				--link: #e8eefc;
				--link-hover-bg: rgba(255, 255, 255, 0.08);
			
				--btn-text: #0b1220;
				--btn-g1: #1dd3ff;
				--btn-g2: #7cff5c;
				--btn-shadow: rgba(92, 124, 255, 0.22);
				--btn-shadow-2: rgba(92, 124, 255, 0.30);
			}
			
			/* LIGHT THEME */
			body.light{
				--bg: #f6f7fb;
				--text: #0f172a;

				--nav-bg: rgba(246, 247, 251, 0.9);
				--nav-border: rgba(15, 23, 42, 0.08);
			
				--link: #0f172a;
				--link-hover-bg: rgba(15, 23, 42, 0.06);
			
				--btn-text: #0b1220;
				--btn-g1: #56f6ff;
				--btn-g2: #6fff5b;
				--btn-shadow: rgba(91, 111, 255, 0.18);
				--btn-shadow-2: rgba(91, 111, 255, 0.26);
			}
			/* Base styles (shared) */
			body{
				margin: 0;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
				background: var(--bg);
				color: var(--text);
			}
			
			.navigation{
				position: sticky;
				top: 0;
				z-index: 10;
				background: var(--nav-bg);
				backdrop-filter: blur(10px);
				border-bottom: 1px solid var(--nav-border);
			}
			
			nav.navigation a{
				color: var(--link);
				text-decoration: none;
				font-weight: 600;
				letter-spacing: 0.2px;
				padding: 10px 12px;
				border-radius: 10px;
				transition: background-color 160ms ease, transform 160ms ease;
			}
			
			nav.navigation a:hover{
				background: var(--link-hover-bg);
				transform: translateY(-1px);
			}
			
			#bingo-cards button{
				appearance: none;
				border: 0;
				cursor: pointer;
				padding: 14px 22px;
				border-radius: 14px;
				font-size: 1rem;
				font-weight: 700;

				color: var(--btn-text);
				background: linear-gradient(135deg, var(--btn-g1), var(--btn-g2));
				box-shadow: 0 12px 30px var(--btn-shadow);
				transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
			}
			
			#bingo-cards button:hover{
				transform: translateY(-2px);
				box-shadow: 0 16px 36px var(--btn-shadow-2);
				filter: brightness(1.04);
			}
			
			#bingo-cards button:active{
				transform: translateY(0);
			}
			
			/* Layout unchanged */
			nav.navigation{
				max-width: 1100px;
				margin: 0 auto;
				padding: 14px 18px;
				display: flex;
				align-items: center;
				gap: 18px;
				justify-content: center;
			}
			
			nav.navigation a#dark-mode{
				margin-left: auto;
				padding: 8px;
				display: inline-flex;
				align-items: center;
				justify-content: center;
			}
			
			nav.navigation a#dark-mode img{
				width: 22px;
				height: 22px;
				display: block;
			}
			.body{
				min-height: calc(100vh - 60px);
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				padding: 48px 18px;
				text-align: center;
			}
			.title{
				font-family: Inter;
				font-style: italic;
				font-size: clamp(2rem, 5vw, 3.25rem);
				margin: 0 0 18px;
				line-height: 1.05;
			}
			#cards{
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 10px;
			}
		</style>
		<script type="module">
			const { invoke } = window.__TAURI__.core;
			document.addEventListener('DOMContentLoaded', () => {
				const toggle = document.getElementById('dark-mode');
				const theme_img = document.getElementById('theme-img');
				const editable_img = Array.from(document.getElementsByClassName('editable'));
				
				const ICON_LIGHT = '/assets/enable-light-mode.svg';
				const ICON_DARK  = '/assets/enable-dark-mode.svg';

				// Changes the theme depending on the theme the user has
				function setTheme(theme){
					document.body.classList.toggle('light', theme === 'light');
					theme_img.src = theme === 'light' ? ICON_DARK : ICON_LIGHT;
					if (editable_img != null) {
						editable_img.forEach(img => {
							const dark_icon = '/assets/editable-board-dark.svg';
							const light_icon = '/assets/editable-board-light.svg';
							img.src = (theme === 'light') ? light_icon : dark_icon;
						});
					}
					localStorage.setItem('theme', theme);
				}
				// Caches the user's theme preference
				const saved = localStorage.getItem('theme');
				if (saved === 'light' || saved === 'dark') {
					setTheme(saved);
				} else {
					const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
					setTheme(prefersLight ? 'light' : 'dark');
				}
				
				toggle.addEventListener('click', (e) => {
					e.preventDefault(); // prevents jumping due to href
					const next = document.body.classList.contains('light') ? 'dark' : 'light';
					setTheme(next);
				});
			});

			// Creates the card in the DOM
			function draw_card(name, owner) {
				const card_wrapper = document.createElement('div');
				card.className = "card-wrapper";

				const name_wrapper = document.createElement('div');
				name_wrapper.className = "name-wrapper";
				const card_name = document.createElement('a');
				card_name.textContent = name;
				name_wrapper.appendChild(card_name);
				
				const button_wrapper = document.createElement('div');
				button_wrapper.className = "button-wrapper";
				if (owner === true) {
					const edit_anchor = document.createElement('a');
					const edit_img = document.createElemnt('img');
					const IMAGE = '/assets/editable-board-dark.svg'
					
					button_wrapper.appendChild(edit_anchor);
				}
				
				card_wrapper.appendChild(name_wrapper);
				card_wrapper.appendChild(button_wrapper);
			}
			let boards;
			try {
				boards = await invoke('get_boards');
			} catch (error) {
				// If the function doesn't exist or it fails the boards should be empty
				boards = [];
			}
			if (boards.length === 0) {
				const cards = document.getElementById('bingo-cards');

				const create_board_button = document.createElement('button');
				create_board_button.id = "create-board";
				create_board_button.textContent = "Get Started";
				create_board_button.addEventListener("click", () => {
					window.location.href = 'bingo-items/bingo-items.html';
				});
				cards.appendChild(create_board_button);
			} 
			else {
				for (const elem in boards) {
					// TODO: Render the cards of the boards.
					draw_card(elem.city, elem.owner);
				}
			}
		</script>
	</head>

	<body>
		<div class="navigation">
			<nav class="navigation">
				<a href="index.html" id="home">Home</a>
				<a href="about:blank" id="about">About</a>
				<a id="dark-mode">
					<img src="/assets/enable-light-mode.svg" alt="Light Mode Selector" id="theme-img">
				</a>
			</nav>
		</div>
		<div class="body">
				<h1 class="title">
					<img src="/assets/bingus.svg" alt="logo" id="home-logo">
					bingus
				</h1>
				<div id="bingo-cards">
						<!-- This section draws out preview for each Bingo Board -->
				</div>
		</div>
	</body>
</html>
