<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Bingus</title>
		<style>
			/* QoL for users to know what elements are clickable */
			a {
				cursor: pointer;
			}
			/* Prevents images from being draggable */
			img {
				-webkit-user-drag: none;
				user-drag: none;
				draggable = false;
				pointer-events: auto;
			}

			/* DARK THEME (default) */
			body{
				--bg: #0b1220;
				--text: #e8eefc;
				--text-1: rgba(255,255,255,0.55);

				--nav-bg: rgba(11, 18, 32, 0.85);
				--nav-border: rgba(255, 255, 255, 0.08);

				--link: #e8eefc;
				--link-hover-bg: rgba(255, 255, 255, 0.08);

				--btn-text: #0b1220;
				--btn-g1: #1dd3ff;
				--btn-g2: #7cff5c;
				--btn-shadow: rgba(92, 124, 255, 0.22);
				--btn-shadow-2: rgba(92, 124, 255, 0.30);
			}

			/* LIGHT THEME */
			body.light{
				--bg: #f6f7fb;
				--text: #0f172a;
				--text-1: rgba(0, 0, 0, 0.35);

				--nav-bg: rgba(246, 247, 251, 0.9);
				--nav-border: rgba(15, 23, 42, 0.08);

				--link: #0f172a;
				--link-hover-bg: rgba(15, 23, 42, 0.06);

				--btn-text: #0b1220;
				--btn-g1: #56f6ff;
				--btn-g2: #6fff5b;
				--btn-shadow: rgba(91, 111, 255, 0.18);
				--btn-shadow-2: rgba(91, 111, 255, 0.26);
			}
			/* Base styles (shared) */
			body{
				margin: 0;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
				background: var(--bg);
				color: var(--text);
			}

			.navigation{
				position: sticky;
				top: 0;
				z-index: 10;
				background: var(--nav-bg);
				backdrop-filter: blur(10px);
				border-bottom: 1px solid var(--nav-border);
			}

			nav.navigation a{
				color: var(--link);
				text-decoration: none;
				font-weight: 600;
				letter-spacing: 0.2px;
				padding: 10px 12px;
				border-radius: 10px;
				transition: background-color 160ms ease, transform 160ms ease;
			}

			nav.navigation a:hover{
				background: var(--link-hover-bg);
				transform: translateY(-1px);
			}

			#bingo-cards button{
				appearance: none;
				border: 0;
				cursor: pointer;
				padding: 14px 22px;
				border-radius: 14px;
				font-size: 1rem;
				font-weight: 700;

				color: var(--btn-text);
				background: linear-gradient(135deg, var(--btn-g1), var(--btn-g2));
				box-shadow: 0 12px 30px var(--btn-shadow);
				transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
			}

			#bingo-cards button:hover{
				transform: translateY(-2px);
				box-shadow: 0 16px 36px var(--btn-shadow-2);
				filter: brightness(1.04);
			}

			#bingo-cards button:active{
				transform: translateY(0);
			}

			/* Layout unchanged */
			nav.navigation{
				max-width: 1100px;
				margin: 0 auto;
				padding: 14px 18px;
				display: flex;
				align-items: center;
				gap: 18px;
				justify-content: center;
			}

			nav.navigation a#dark-mode{
				margin-left: auto;
				padding: 8px;
				display: inline-flex;
				align-items: center;
				justify-content: center;
			}

			nav.navigation a#dark-mode img{
				width: 22px;
				height: 22px;
				display: block;
			}
			.body{
				min-height: calc(100vh - 60px);
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				padding: 48px 18px;
				text-align: center;
			}
			.title{
				font-family: Inter;
				font-style: italic;
				font-size: clamp(2rem, 5vw, 3.25rem);
				margin: 0 0 18px;
				line-height: 1.05;
			}
			#cards{
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 10px;
			}
			/* Make ONLY the card border show (gradient) */
			.card-wrapper{
				position: relative;
				border-radius: 18px;
				padding: 18px;
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 14px;

				/* inner fill */
				background: rgba(255,255,255,0.02);

				/* Size of card */
				width: 75vw;
				max-width: 900px;
				margin: 0 auto;
			}

			/* Gradient border drawn with a pseudo-element.
				Inner content has no borders/outlines. */
			.card-wrapper::before{
				content: "";
				position: absolute;
				inset: 0;
				border-radius: inherit;
				padding: 1px; /* thickness of border */
				background: linear-gradient(135deg,
					var(--btn-g1),
					var(--btn-g2)
				);
				-webkit-mask:
				linear-gradient(#000 0 0) content-box,
				linear-gradient(#000 0 0);
				-webkit-mask-composite: xor;
				mask-composite: exclude;
				pointer-events: none;
			}

			/* Remove any outlines/borders from everything inside the card */
			.name-wrapper,
			.button-wrapper,
			.card-title,
			.card-city,
			.card-wrapper a {
				border: none !important;
				outline: none !important;
				box-shadow: none !important;
			}

			/* Layout for the text area */
			.name-wrapper{
				display: flex;
				flex: 1 1 auto;
				min-width: 0;
			}

			.name-wrapper a{
				display: flex;
				flex-direction: column;
				gap: 2px;
				text-decoration: none;
				min-width: 0;
			}

			/* Title/city styling (no outlines/borders) */
			.card-title{
				color: var(--text);
				font-size: 14px;
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
				text-decoration: underline;
				letter-spacing: 0.2px;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.card-city{
				color: var(--text-1);
				font-size: 12px;
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			/* Buttons area */
			.button-wrapper{
				display: flex;
				align-items: center;
				gap: 10px;
				flex: 0 0 auto;
			}

			.button-wrapper a{
				display: grid;
				place-items: center;
				width: 34px;
				height: 34px;

				/* no border/outline; just subtle background */
				background: rgba(255,255,255,0.02);
				border-radius: 11px;

				text-decoration: none;

				/* Make buttons positionable for the pseudo border */
				position: relative;
				border-radius: 50%;
				overflow: hidden;          /* keeps corners clean */
				z-index: 0;                /* pseudo can sit behind content */
			}

			.edit-button,
			.play-button {
				width: 21px;
				height: 21px;
				display: block;
			}

			/* Gradient border on the button */
			.button-wrapper a::before{
				content: "";
				position: absolute;
				inset: 0;
				border-radius: inherit;

				padding: 1px; /* thickness */
				background: linear-gradient(135deg, var(--btn-g1), var(--btn-g2));

				/* mask to show only the border */
				-webkit-mask:
				linear-gradient(#000 0 0) content-box,
				linear-gradient(#000 0 0);
				-webkit-mask-composite: xor;
				mask-composite: exclude;

				pointer-events: none;
				z-index: -1;
				opacity: 0.9;
				transition: opacity 160ms ease, filter 160ms ease;
			}

			/* Hover/focus response */
			.button-wrapper a{
				transition: background 160ms ease, transform 160ms ease;
			}

			.button-wrapper a:hover{
				background: rgba(255,255,255,0.06);
				transform: translateY(-1px);
			}

			.button-wrapper a:hover::before{
				opacity: 1;
				filter: brightness(1.15);
			}

			.button-wrapper a:focus-visible{
				background: rgba(255,255,255,0.06);
			}

			.button-wrapper a:focus-visible::before{
				opacity: 1;
				filter: brightness(1.2);
			}
		</style>
		<script src="main.js" type="module"></script>
	</head>

	<body>
		<div class="navigation">
			<nav class="navigation">
				<a href="index.html" id="home">Home</a>
				<a href="about/about.html" id="about">About</a>
				<a id="dark-mode">
					<img
						src="/assets/enable-light-mode.svg"
						alt="Light Mode Selector"
						id="theme-img"
					/>
				</a>
			</nav>
		</div>
		<div class="body">
			<h1 class="title">
				<img src="/assets/bingus.svg" alt="logo" id="home-logo" />
				Welcome to bingus!
			</h1>
			<div id="bingo-cards">
				<!-- This section draws out preview for each Bingo Board -->
			</div>
		</div>
	</body>
</html>
